id: atlassian
name: "Atlassian"
version: 1.0.3
description: Connect your agent to Atlassian — Jira and Confluence via MCP server
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Connect providers this integration's tools resolve credentials from.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [atlassian]

supported_agents: [openclaw, hermes]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

features:
  - Jira issue tracking (create, update, search, transitions, sprints, boards)
  - Confluence page management (create, edit, search, spaces, comments)
  - 72+ tools via sooperset/mcp-atlassian MCP server
  - "Multi-site support (Pattern A — pass `cloudId` to target a specific Atlassian site)"
  - Multi-account support (one OAuth user can own multiple Cloud sites)
  - Automatic per-Connection OAuth2 token refresh with fan-out across sites
  - "Partial-failure surfacing — sites that fail to initialise are visible in atlassian_list_accounts with `connected: false`"

installs:
  runtimes:
    openclaw: {}
    # Hermes runs the same runtime-agnostic stdio MCP server declared in
    # the top-level `mcp_servers` block — no plugin/skill/config to apply.
    hermes: {}

mcp_servers:
  - id: atlassian
    command: npx
    # The proxy resolves credentials itself via @alfe.ai/agent-api-client,
    # so no `env` injection is needed here. `requires_credentials` is kept
    # so install gating and marketplace UX still understand this
    # integration as credential-driven.
    args: ["-y", "@alfe.ai/atlassian-mcp@0.3.8"]
    requires_credentials: atlassian

hooks:
  post_install: hooks/post-install.sh
  post_activate: hooks/post_activate.mjs

config_schema:
  - key: atlassian_account
    type: oauth_connect
    label: "Atlassian Account"
    description: "Connect the Atlassian account for this agent"
    required: true
    oauth_provider: atlassian

capabilities:
  - atlassian.jira
  - atlassian.confluence
