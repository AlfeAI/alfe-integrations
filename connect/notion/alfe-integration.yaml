id: notion
name: "Notion"
version: 1.0.1
description: Connect your agent to Notion — pages, databases, comments and more
license: MIT
min_gateway_version: 1.0.0

# Connect providers this integration's tools resolve credentials from.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [notion]

supported_agents: [openclaw, hermes]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

features:
  - Read and search Notion pages and databases
  - Create and update pages, blocks, and database entries
  - Manage comments and discussions
  - Query database views with filters and sorts

installs:
  runtimes:
    openclaw: {}
    # Hermes runs the same runtime-agnostic stdio MCP server declared in
    # the top-level `mcp_servers` block — no plugin/skill/config to apply.
    hermes: {}

mcp_servers:
  - id: notion
    command: npx
    args: ["-y", "@alfe.ai/notion-mcp@0.3.1"]
    # Proxy fetches creds from the Alfe API at startup; the
    # `requires_credentials` flag keeps the applier from registering
    # the MCP until Notion is actually connected.
    requires_credentials: notion

config_schema:
  - key: notion_account
    type: oauth_connect
    label: "Notion Workspace"
    description: "Connect the Notion workspace for this agent"
    required: true
    oauth_provider: notion
