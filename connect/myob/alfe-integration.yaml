id: myob
name: "MYOB Business"
version: 1.0.0
description: Connect your agent to MYOB Business — manage invoices, contacts, and finances via custom MCP server
license: MIT
min_gateway_version: 1.0.0

# Connect providers this integration's tools resolve credentials from.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [myob]

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

features:
  - Full MYOB Business API access (contacts, invoices, payments, GL)
  - Automatic OAuth2 token refresh (20-min tokens)
  - Create and manage invoices, quotes, contacts
  - General ledger, chart of accounts, journal entries
  - Inventory items and adjustments

installs:
  runtimes:
    openclaw: {}

mcp_servers:
  - id: myob
    command: npx
    args: ["-y", "@alfe.ai/openclaw-myob@0.2.0"]
    # The proxy fetches credentials from the Alfe API at startup, so
    # no env interpolation is needed. The `requires_credentials` flag
    # makes the applier skip registration when MYOB isn't connected
    # yet — matches what the deleted post_activate.mjs hook did.
    requires_credentials: myob

config_schema:
  - key: myob_account
    type: oauth_connect
    label: "MYOB Account"
    description: "Connect the MYOB Business account for this agent"
    required: true
    oauth_provider: myob
