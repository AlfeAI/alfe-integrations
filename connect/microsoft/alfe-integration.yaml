id: microsoft
name: "Microsoft 365"
version: 1.2.0
description: Connect your agent to Microsoft 365 — Outlook Mail, Calendar, OneDrive, and more
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Connect providers this integration's tools resolve credentials from.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [microsoft]

supported_agents: [openclaw, hermes]

author:
  name: Alfe
  url: https://alfe.ai
icon: ./assets/icon.svg
preview_images:
  - ./assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Outlook Mail send/read/triage
  - Outlook Calendar scheduling
  - OneDrive file management
  - OneNote, To Do, Contacts, SharePoint access
  - Direct Microsoft Graph access from your agent

installs:
  runtimes:
    openclaw: {}
    # Hermes runs the same runtime-agnostic stdio MCP server declared in
    # the top-level `mcp_servers` block — no plugin/skill/config to apply.
    hermes: {}

mcp_servers:
  - id: microsoft
    command: npx
    args: ["-y", "@alfe.ai/microsoft-mcp@0.1.0"]
    # Server fetches creds from the Alfe API at startup; the
    # `requires_credentials` flag keeps the applier from registering
    # the MCP until Microsoft is actually connected.
    requires_credentials: microsoft

config_schema:
  - key: microsoft_account
    type: oauth_connect
    label: "Microsoft 365 Account"
    description: "Connect the Microsoft 365 account for this agent"
    required: true
    oauth_provider: microsoft

capabilities:
  - microsoft.outlook.mail
  - microsoft.outlook.calendar
  - microsoft.onedrive
  - microsoft.onenote
  - microsoft.todo
  - microsoft.contacts
  - microsoft.sharepoint
