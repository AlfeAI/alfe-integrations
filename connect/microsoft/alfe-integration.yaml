id: microsoft
name: "Microsoft 365"
version: 1.1.0
description: Connect your agent to Microsoft 365 — Outlook Mail, Calendar, OneDrive, and more
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Connect providers this integration's tools resolve credentials from.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [microsoft]

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: ./assets/icon.svg
preview_images:
  - ./assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Outlook Mail send/read/triage
  - Outlook Calendar scheduling
  - OneDrive file management
  - OneNote, To Do, Contacts, SharePoint access
  - Direct Microsoft Graph access from your agent

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-microsoft@0.1.0"
      # NOTE: the `m365-*` ClawHub skills below were removed 2026-07-08 — they
      # were never published to clawhub.ai, so every install 404'd and (with the
      # skill-install masking fix in @alfe/integrations) all-skills-fail would
      # force this integration to report `error` despite the working plugin.
      # The openclaw-microsoft plugin (Graph REST) is fully functional without
      # them. Re-add here once the skills are authored + `clawhub skill publish`ed:
      #   m365-shared, m365-onedrive, m365-outlook-mail, m365-outlook-calendar,
      #   m365-todo, m365-contacts, m365-onenote, m365-sharepoint, m365-excel,
      #   m365-word, m365-powerpoint, m365-outlook-send, m365-outlook-triage,
      #   m365-calendar-agenda, m365-onedrive-upload, m365-onedrive-search

hooks:
  post_install: hooks/post-install.sh
  post_activate: hooks/post_activate.mjs
  health_check: hooks/health.sh

config_schema:
  - key: microsoft_account
    type: oauth_connect
    label: "Microsoft 365 Account"
    description: "Connect the Microsoft 365 account for this agent"
    required: true
    oauth_provider: microsoft

capabilities:
  - microsoft.outlook.mail
  - microsoft.outlook.calendar
  - microsoft.onedrive
  - microsoft.onenote
  - microsoft.todo
  - microsoft.contacts
  - microsoft.sharepoint
