id: github
name: "GitHub"
version: 1.0.0
description: Connect your agent to GitHub — manage repositories, issues, pull requests, and more (multi-account)
license: MIT
min_gateway_version: 1.0.0

# Connect providers this integration's tools resolve credentials from.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [github]

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

features:
  - Multi-account support — connect a personal account and an org bot side-by-side
  - Pattern A — every credential-touching tool requires an explicit `login` selector
  - Full GitHub API access via the @alfe.ai/openclaw-github proxy
  - Repository management (create, list, search)
  - Issues and pull requests (create, comment, review)
  - Code search and file operations

installs:
  runtimes:
    openclaw: {}

mcp_servers:
  - id: github
    command: npx
    # The proxy fetches credentials from the Alfe API at startup
    # (Pattern A multi-account) rather than reading them via env
    # interpolation. `requires_credentials` is kept for marketplace /
    # registry semantics — the McpApplier's env-presence gate is moot
    # here because `env` is empty, so the MCP starts as soon as the
    # integration is installed, and the proxy itself degrades to
    # discovery-only tools when zero accounts are connected.
    args: ["-y", "@alfe.ai/openclaw-github@0.2.0"]
    requires_credentials: github

config_schema:
  - key: github_account
    type: oauth_connect
    label: "GitHub Account"
    description: "Connect the GitHub account for this agent"
    required: true
    oauth_provider: github

capabilities:
  - github.repositories
  - github.issues
  - github.pull_requests
  - github.code_search
