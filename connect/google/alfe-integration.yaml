id: google
name: "Google Workspace"
version: 1.0.0
description: Connect your agent to Google Workspace — Chat, Drive, Gmail, Calendar, Sheets, Docs and more
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Connect providers this integration's tools resolve credentials from.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [google]

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: ./assets/icon.svg
preview_images:
  - ./assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Google Chat messaging (DMs, spaces, threads)
  - Google Drive file management
  - Gmail send/read/triage
  - Google Calendar scheduling
  - Google Sheets read/write
  - Google Docs editing
  - Full Google Workspace CLI (80+ skills)

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-google"
      skills:
        # Core service skills
        - clawhub: gws-shared
        - clawhub: gws-chat
        - clawhub: gws-drive
        - clawhub: gws-gmail
        - clawhub: gws-calendar
        - clawhub: gws-sheets
        - clawhub: gws-docs
        - clawhub: gws-slides
        - clawhub: gws-tasks
        - clawhub: gws-people
        - clawhub: gws-forms
        - clawhub: gws-keep
        # Helper skills (common operations)
        - clawhub: gws-chat-send
        - clawhub: gws-gmail-send
        - clawhub: gws-gmail-triage
        - clawhub: gws-sheets-read
        - clawhub: gws-calendar-agenda
        - clawhub: gws-drive-upload
        - clawhub: gws-drive-search

hooks:
  post_install: hooks/post-install.sh
  post_activate: hooks/post_activate.mjs
  health_check: hooks/health.sh

config_schema:
  - key: google_account
    type: oauth_connect
    label: "Google Account"
    description: "Connect the Google account for this agent"
    required: true
    oauth_provider: google

capabilities:
  - google.chat
  - google.drive
  - google.gmail
  - google.calendar
  - google.sheets
  - google.docs
  - google.workspace
