id: search
name: "Search"
version: 1.0.0
description: "Web, image, and news search"
license: MIT
depends_on: []
min_gateway_version: 1.0.0

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
pricing:
  type: usage
features:
  - Web search with rich snippets, titles, and descriptions
  - Image search with thumbnails and metadata
  - News search with articles, sources, and publication dates
  - Optional BYOK — bring your own API key to bypass metered billing

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-search"

config_schema:
  - key: brave_api_key
    type: secret
    label: "Brave API Key (Optional)"
    description: "Provide your own Brave Search API key to bypass metered billing. Leave blank to use Alfe's managed key."
    required: false

capabilities:
  - search.web
  - search.images
  - search.news
