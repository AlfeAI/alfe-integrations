id: webhooks
name: "Webhooks"
version: 1.0.0
description: Receive and manage HTTP webhooks from external services
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Agent runtimes this integration supports (empty = universal/all runtimes)
supported_agents: []

# Marketplace metadata
author:
  name: Alfe
  url: https://alfe.ai
pricing:
  type: free
features:
  - Custom webhook endpoints with HMAC-SHA256 verification
  - Agent self-service — create, rotate, and delete webhooks programmatically
  - Multiple webhooks per agent for different external sources
  - Per-webhook signing secrets
  - Automatic offline queuing and retry on reconnect

# Source repository (used by daemon for commit-pinned install)

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-webhooks"
      skills:
        - path: skills/webhook-handler

config_schema:
  - key: max_webhooks
    type: number
    label: "Maximum Webhooks"
    description: "Maximum number of webhook endpoints this agent can create (default: 10)"
    required: false
    default: 10
    editable: admin
  - key: webhooks_ws_url
    type: string
    label: "Webhooks Service URL"
    description: "WebSocket URL of the Alfe webhooks service"
    required: false
    default: "wss://webhooks.alfe.ai/ws"

capabilities:
  - webhooks.receive
  - webhooks.manage
