id: slack
name: "Slack"
version: 1.0.0
description: Connect your agent to Slack workspaces
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Agent runtimes this integration supports (empty = universal/all runtimes)
supported_agents: []

author:
  name: Alfe
  url: https://alfe.ai
icon: https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/slack/assets/icon.svg
preview_images:
  - https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/slack/assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Channel messaging
  - Slash commands
  - Thread support
  - Direct messages

repository: https://github.com/AlfeAI/integration-slack.git

config_schema:
  - key: slack_workspace
    type: oauth_connect
    label: "Slack Workspace"
    description: "Connect your Slack workspace via OAuth"
    required: true
    oauth_provider: slack

capabilities:
  - slack.messages
  - slack.commands
  - slack.threads
