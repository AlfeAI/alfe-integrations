id: sync
name: "Sync"
version: 1.0.4
description: Back up your agent configuration and memory to the cloud
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Agent runtimes this integration supports (empty = universal/all runtimes)
supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/sync/assets/icon.svg
preview_images:
  - https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/sync/assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Config backup
  - Conversation history
  - Memory sync
  - Scheduled sync


config_schema:
  - key: sync_scope
    type: multi_select
    label: "Sync Scope"
    description: "Choose what to sync to the cloud"
    required: true
    select_options:
      - value: config
        label: "Configuration"
      - value: conversations
        label: "Conversation history"
      - value: memory
        label: "Agent memory"
  - key: sync_schedule
    type: select
    label: "Schedule"
    description: "How often to sync"
    required: true
    select_options:
      - value: realtime
        label: "Real-time"
      - value: hourly
        label: "Every hour"
      - value: daily
        label: "Daily"
      - value: weekly
        label: "Weekly"

capabilities:
  - sync.config
  - sync.conversations
  - sync.memory

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-sync@0.2.7"
      skills:
        - path: skills/alfe-sync
      config:
        plugins:
          entries:
            "@alfe.ai/openclaw-sync":
              config:
                syncScope: "{{config.sync_scope}}"
                syncSchedule: "{{config.sync_schedule}}"
