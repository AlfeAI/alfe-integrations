id: alfe
name: "Alfe"
version: 1.0.0
description: Core Alfe platform plugin — integration management, LLM proxy routing
license: MIT
depends_on: []
supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw"
      config:
        session:
          dmScope: "per-channel-peer"
        models:
          providers:
            anthropic:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              models:
                - claude-opus-4-6
                - claude-sonnet-4-6
                - claude-haiku-4-5
              request:
                allowPrivateNetwork: true
            openai:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              models:
                - gpt-4o
                - gpt-4o-mini
                - o3
                - gpt-4.1
                - gpt-4.1-mini
                - gpt-4.1-nano
                - gpt-5.4
                - gpt-5.4-mini
                - gpt-5.4-nano
                - gpt-5.4-pro
                - o3-mini
                - o4-mini
              request:
                allowPrivateNetwork: true
            google:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              models:
                - gemini-2.5-pro
                - gemini-2.5-flash
                - gemini-2.5-flash-lite
                - gemini-2.0-flash
              request:
                allowPrivateNetwork: true
            deepseek:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              models:
                - deepseek-chat
                - deepseek-reasoner
              request:
                allowPrivateNetwork: true
            minimax:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              models:
                - MiniMax-M2.7
                - MiniMax-M2.5
              request:
                allowPrivateNetwork: true
            mistral:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              models:
                - mistral-large-latest
                - mistral-small-latest
                - codestral-latest
              request:
                allowPrivateNetwork: true
            xai:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              models:
                - grok-4
                - grok-4.1-fast
              request:
                allowPrivateNetwork: true

commands:
  - name: "alfe.config_set"
    handler: ./commands/config-set.js
    method: handle
    timeout_ms: 10000
    description: "Set an OpenClaw config key (allowlisted keys only)"

config_schema: []
