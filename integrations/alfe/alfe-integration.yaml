id: alfe
name: "Alfe"
version: 1.1.26
description: Core Alfe platform plugin — integration management, LLM proxy routing, chat + webhooks + console
license: MIT
depends_on: []
supported_agents: [openclaw]

# Folded in from the legacy `console` integration (PR 12 of
# channels-and-credential-driven-integrations). The console
# integration carried a single `post_activate` hook that ensured
# `~/.openclaw/openclaw.json` had `gateway.auth.token` set so the
# daemon could authenticate its own loopback requests when
# forwarding console traffic to localhost:18789. The hook is now
# baselined with `alfe`.
hooks:
  post_activate: hooks/post_activate.js

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw@0.4.4"
        - package: "@alfe.ai/openclaw-metrics@0.0.31"
        - package: "@alfe.ai/openclaw-identity@0.1.19"
        - package: "@alfe.ai/openclaw-search@0.0.30"
        - package: "@alfe.ai/openclaw-secrets@0.2.16"
        - package: "@alfe.ai/openclaw-mcp-bundler@0.0.23"
        # Folded in from the legacy `chat` integration (PR 11 of
        # channels-and-credential-driven-integrations). The chat plugin
        # is now a platform-baseline capability and ships with `alfe`.
        - package: "@alfe.ai/openclaw-chat@0.9.2"
        # Folded in from the legacy `webhooks` integration (PR 11).
        - package: "@alfe.ai/openclaw-webhooks@0.0.18"
        # Folded in from the legacy `console` integration (PR 12 follow-up to
        # channels-and-credential-driven-integrations). The console plugin
        # is now a platform-baseline capability and ships with alfe.
        - package: "@alfe.ai/openclaw-console@0.0.11"
        # Scoped org/team/project knowledge resources: search + read + propose/
        # edit shared DOCUMENTS + profile (facts primitive removed 2026-07-06 —
        # one home per fact; agents find the right doc and edit it, quick capture
        # stays in private per-agent memory). Ships resource_propose_change so a
        # non-member agent can propose to scopes it can't write directly.
        # 0.0.8 = the propose-change build (0.0.7 predates it). NOTE: pinned
        # ahead of publish at the user's request — must be live on npm before any
        # agent reconcile picks this up.
        - package: "@alfe.ai/openclaw-knowledge@0.0.11"
        # Voice tools are a platform-baseline capability: EVERY agent gets
        # `voice_tts` / `voice_stt` (and the telephony placeholder tools),
        # not just agents with a phone number. The `voice` channel
        # integration therefore no longer re-declares this plugin — it owns
        # only the Twilio/telephony concern. Single owner avoids the
        # bare-name install dedup silently ignoring a divergent second pin.
        - package: "@alfe.ai/openclaw-voice@0.1.7"
        # Interactive remote-control relay. A CORE capability (like chat /
        # console / webhooks / voice above) so EVERY agent gets the relay
        # connection + web terminal — the terminal needs no browser at all.
        # The browser co-browse surface additionally needs Chrome (the
        # `headless-browser` integration) and degrades gracefully when it's
        # absent: the terminal + relay keep working, only browser_* tools error.
        # Reads `browser.ssrfPolicy` from the config block below; derives its
        # per-stage relay URL from the agent's apiUrl (no hardcoded URL).
        #
        # PIN: must match a PUBLISHED version of @alfe.ai/openclaw-remote.
        # 0.0.2 pulls @alfe.ai/terminal@^0.1.1 — the prebuilt-multiarch node-pty
        # that makes the web terminal work on managed Linux VMs (0.0.1 shipped
        # the old node-pty with no linux-x64 prebuild). 0.0.6 makes
        # request_browser_takeover return a dashboard control-URL the agent
        # shares in chat (no dependency on the chat event→card path). 0.0.9 fixes
        # the co-browse takeover: grant the human turn only on a real claim
        # (TAKEOVER_REQUEST) + addHold across the wait (no more about:blank);
        # pulls @alfe.ai/browser@^0.2.0. Bump this + the submodule-pointer only
        # AFTER the version is on npm, or install fails "version not found".
        - package: "@alfe.ai/openclaw-remote@0.0.9"
      skills:
        # Folded in from the legacy `webhooks` integration's
        # `installs.runtimes.openclaw.skills` (PR 11). Lives at
        # integrations/integrations/alfe/skills/webhook-handler/ in the
        # submodule.
        - path: skills/webhook-handler
      config:
        browser:
          ssrfPolicy:
            dangerouslyAllowPrivateNetwork: true
        session:
          dmScope: "per-channel-peer"
        # Structured thinking for reasoning-capable models (claude-*).
        # OpenClaw has NO per-dispatch thinking parameter — the chat
        # relay's `thinking:'low'` RPC field can't reach the run; the
        # level resolves session `/think` override → per-agent
        # `thinkingDefault` → this default. TWO keys gate live thought
        # streaming (verified against the openclaw dist):
        #   - thinkingDefault != off  → the model PRODUCES reasoning
        #   - reasoningDefault: stream → reasoning is EMITTED to the
        #     agent-event bus as stream:'thinking' deltas (what the
        #     console shows and the chat plugin forwards as thinking
        #     cards). "off" (the default) emits nothing; "on" would fold
        #     reasoning into the reply text instead — never use it here.
        # `low` bounds the token cost; `/think off|high` and `/reasoning`
        # per-session overrides still win.
        agents:
          defaults:
            thinkingDefault: "low"
            reasoningDefault: "stream"
        # Folded in from the legacy `console` integration (PR 12). The
        # console plugin maintains an outbound WS to the console service
        # and multiplexes browser sessions over it — no gateway data-
        # plane hop, no public IP. `allowedOrigins` lists the console
        # service origins permitted to attach; `dangerouslyDisableDevice
        # Auth` short-circuits the local device-auth handshake because
        # the daemon's tunnel handler now injects an authenticated token
        # via the post_activate hook below.
        gateway:
          controlUi:
            allowedOrigins:
              - "https://console.dev.alfe.ai"
              - "https://console.alfe.ai"
            dangerouslyDisableDeviceAuth: true
        models:
          providers:
            anthropic:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              api: "anthropic-messages"
              # The anthropic-messages transport hard-requires a positive
              # maxTokens on every model definition (bare {id, name} entries
              # are schema-enriched with maxTokens: 0 and every run fails
              # with "requires a positive maxTokens value"). The OpenAI-style
              # providers below don't need it — max_tokens is optional there.
              models:
                - id: claude-opus-4-8
                  name: "Claude Opus 4.8"
                  contextWindow: 1000000
                  maxTokens: 128000
                - id: claude-opus-4-7
                  name: "Claude Opus 4.7"
                  contextWindow: 1000000
                  maxTokens: 128000
                - id: claude-opus-4-6
                  name: "Claude Opus 4.6"
                  contextWindow: 1000000
                  maxTokens: 128000
                - id: claude-sonnet-4-6
                  name: "Claude Sonnet 4.6"
                  contextWindow: 1000000
                  maxTokens: 64000
                - id: claude-haiku-4-5
                  name: "Claude Haiku 4.5"
                  contextWindow: 200000
                  maxTokens: 64000
            openai:
              baseUrl: "http://127.0.0.1:18193/v1"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: gpt-4o
                  name: "GPT-4o"
                - id: gpt-4o-mini
                  name: "GPT-4o Mini"
                - id: o3
                  name: "o3"
                - id: gpt-4.1
                  name: "GPT-4.1"
                - id: gpt-4.1-mini
                  name: "GPT-4.1 Mini"
                - id: gpt-4.1-nano
                  name: "GPT-4.1 Nano"
                - id: gpt-5.4
                  name: "GPT-5.4"
                - id: gpt-5.4-mini
                  name: "GPT-5.4 Mini"
                - id: gpt-5.4-nano
                  name: "GPT-5.4 Nano"
                - id: gpt-5.4-pro
                  name: "GPT-5.4 Pro"
                - id: gpt-5.5
                  name: "GPT-5.5"
                - id: o3-mini
                  name: "o3 Mini"
                - id: o4-mini
                  name: "o4 Mini"
            google:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              api: "google-generative-ai"
              models:
                - id: gemini-3.5-flash
                  name: "Gemini 3.5 Flash"
                - id: gemini-3.1-pro-preview
                  name: "Gemini 3.1 Pro"
                - id: gemini-3.1-flash-lite
                  name: "Gemini 3.1 Flash Lite"
                - id: gemini-2.5-pro
                  name: "Gemini 2.5 Pro"
                - id: gemini-2.5-flash
                  name: "Gemini 2.5 Flash"
                - id: gemini-2.5-flash-lite
                  name: "Gemini 2.5 Flash Lite"
                - id: gemini-2.0-flash
                  name: "Gemini 2.0 Flash"
            deepseek:
              baseUrl: "http://127.0.0.1:18193/v1"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: deepseek-v4-flash
                  name: "DeepSeek V4 Flash"
                - id: deepseek-v4-pro
                  name: "DeepSeek V4 Pro"
                - id: deepseek-chat
                  name: "DeepSeek Chat"
                - id: deepseek-reasoner
                  name: "DeepSeek Reasoner"
            minimax:
              baseUrl: "http://127.0.0.1:18193/v1"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: MiniMax-M3
                  name: "MiniMax M3"
                - id: MiniMax-M2.7
                  name: "MiniMax M2.7"
                - id: MiniMax-M2.7-highspeed
                  name: "MiniMax M2.7 High Speed"
                - id: MiniMax-M2.5
                  name: "MiniMax M2.5"
            mistral:
              baseUrl: "http://127.0.0.1:18193/v1"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: mistral-large-latest
                  name: "Mistral Large"
                - id: mistral-small-latest
                  name: "Mistral Small"
                - id: codestral-latest
                  name: "Codestral"
            xai:
              baseUrl: "http://127.0.0.1:18193/v1"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: grok-4.3
                  name: "Grok 4.3"
                - id: grok-4
                  name: "Grok 4"
                - id: grok-4.1-fast
                  name: "Grok 4.1 Fast"
            zhipu:
              baseUrl: "http://127.0.0.1:18193/v1"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: glm-5-2
                  name: "GLM 5.2"
                - id: glm-5-1
                  name: "GLM 5.1"
                - id: glm-5-1-air
                  name: "GLM 5.1 Air"

commands:
  - name: "alfe.config_set"
    handler: ./commands/config-set.js
    method: handle
    # `openclaw config set` spawns the full OpenClaw CLI, which takes 5s+ on
    # a small VM under load — 10s dispatch budget produced gateway 504s
    # ("daemon did not respond") and dashboard model changes never applied.
    timeout_ms: 30000
    description: "Set an OpenClaw config key (allowlisted keys only)"

capabilities:
  - search.web
  - search.images
  - search.news
  - secrets.read
  - secrets.write
  # Folded in from the legacy `chat` integration (PR 11).
  - chat.web
  - chat.mobile
  - chat.sessions
  # Folded in from the legacy `webhooks` integration (PR 11).
  - webhooks.receive
  - webhooks.manage
  # Folded in from the legacy `console` integration (PR 12).
  - console.web
  # Interactive remote-control relay. `terminal.session` is universal (every
  # agent); `browser.cobrowse` additionally requires the headless-browser
  # (Chrome) integration and no-ops gracefully without it.
  - browser.cobrowse
  - terminal.session

# Folded in from the legacy `webhooks` integration (PR 11). Kept as
# admin-tunable knobs rather than baked into the plugin so operators
# can adjust per-tenant limits without a plugin release.
config_schema:
  - key: max_webhooks
    type: number
    label: "Maximum Webhooks"
    description: "Maximum number of webhook endpoints this agent can create (default: 10)"
    required: false
    default: 10
    editable: admin
  - key: webhooks_ws_url
    type: string
    label: "Webhooks Service URL"
    description: "WebSocket URL of the Alfe webhooks service"
    required: false
    default: "wss://webhooks.alfe.ai/ws"
