id: alfe
name: "Alfe"
version: 1.0.0
description: Core Alfe platform plugin — integration management, LLM proxy routing
license: MIT
depends_on: []
supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw"
      config:
        session:
          dmScope: "per-channel-peer"
        models:
          providers:
            anthropic:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              api: "anthropic-messages"
              models:
                - id: claude-opus-4-6
                  name: "Claude Opus 4.6"
                - id: claude-sonnet-4-6
                  name: "Claude Sonnet 4.6"
                - id: claude-haiku-4-5
                  name: "Claude Haiku 4.5"
              request:
                allowPrivateNetwork: true
            openai:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: gpt-4o
                  name: "GPT-4o"
                - id: gpt-4o-mini
                  name: "GPT-4o Mini"
                - id: o3
                  name: "o3"
                - id: gpt-4.1
                  name: "GPT-4.1"
                - id: gpt-4.1-mini
                  name: "GPT-4.1 Mini"
                - id: gpt-4.1-nano
                  name: "GPT-4.1 Nano"
                - id: gpt-5.4
                  name: "GPT-5.4"
                - id: gpt-5.4-mini
                  name: "GPT-5.4 Mini"
                - id: gpt-5.4-nano
                  name: "GPT-5.4 Nano"
                - id: gpt-5.4-pro
                  name: "GPT-5.4 Pro"
                - id: o3-mini
                  name: "o3 Mini"
                - id: o4-mini
                  name: "o4 Mini"
              request:
                allowPrivateNetwork: true
            google:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              api: "google-generative-ai"
              models:
                - id: gemini-2.5-pro
                  name: "Gemini 2.5 Pro"
                - id: gemini-2.5-flash
                  name: "Gemini 2.5 Flash"
                - id: gemini-2.5-flash-lite
                  name: "Gemini 2.5 Flash Lite"
                - id: gemini-2.0-flash
                  name: "Gemini 2.0 Flash"
              request:
                allowPrivateNetwork: true
            deepseek:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: deepseek-chat
                  name: "DeepSeek Chat"
                - id: deepseek-reasoner
                  name: "DeepSeek Reasoner"
              request:
                allowPrivateNetwork: true
            minimax:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: MiniMax-M2.7
                  name: "MiniMax M2.7"
                - id: MiniMax-M2.5
                  name: "MiniMax M2.5"
              request:
                allowPrivateNetwork: true
            mistral:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: mistral-large-latest
                  name: "Mistral Large"
                - id: mistral-small-latest
                  name: "Mistral Small"
                - id: codestral-latest
                  name: "Codestral"
              request:
                allowPrivateNetwork: true
            xai:
              baseUrl: "http://127.0.0.1:18193"
              apiKey: "alfe-proxy"
              api: "openai-completions"
              models:
                - id: grok-4
                  name: "Grok 4"
                - id: grok-4.1-fast
                  name: "Grok 4.1 Fast"
              request:
                allowPrivateNetwork: true

commands:
  - name: "alfe.config_set"
    handler: ./commands/config-set.js
    method: handle
    timeout_ms: 10000
    description: "Set an OpenClaw config key (allowlisted keys only)"

config_schema: []
