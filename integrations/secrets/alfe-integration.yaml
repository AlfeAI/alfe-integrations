id: secrets
name: "Secrets"
version: 1.0.0
description: Per-scope (org/team/project/agent) encrypted secret storage. Agents encrypt/decrypt locally with AES-256-GCM; KMS data keys are issued by the Alfe secrets service. The backend never sees plaintext.
license: MIT
depends_on: []
min_gateway_version: 1.0.0

supported_scopes: [org, team, project, agent]
supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free
  description: "Included with the Alfe platform — KMS cost is negligible at v1 volume."

features:
  - Per-scope secret isolation (org / team / project / agent)
  - Agent-side AES-256-GCM with KMS-issued data keys
  - Opaque secretId in the KMS encryption context (no secretName in CloudTrail)
  - Dashboard write-only — plaintext is only readable through an agent
  - Full CRUD tools for secret management

capabilities:
  - secrets.read
  - secrets.write

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-secrets"
