id: openai
name: "OpenAI (GPT)"
version: "1.0.0"
description: "Connect your agent to OpenAI models via Alfe credits or your own API key"
author: "Alfe"
license: "MIT"

config_schema:
  - key: mode
    type: enum
    options: ["alfe_credits", "byok"]
    default: alfe_credits
    label: "API Key Source"
    description: "Use Alfe credits (proxied, metered) or bring your own OpenAI key"
    required: true

  - key: api_key
    type: secret
    label: "OpenAI API Key"
    description: "Your OpenAI API key (sk-...)"
    depends_on_field: { key: mode, value: "byok" }

  - key: default_model
    type: select
    select_options:
      - label: "GPT-4o"
        value: "gpt-4o"
      - label: "GPT-4o Mini"
        value: "gpt-4o-mini"
      - label: "o3"
        value: "o3"
    default: "gpt-4o"
    label: "Default Model"
    description: "The model your agent uses by default (can be overridden per-conversation)"

  - key: allowed_models
    type: multi_select
    select_options:
      - label: "GPT-4o"
        value: "gpt-4o"
      - label: "GPT-4o Mini"
        value: "gpt-4o-mini"
      - label: "o3"
        value: "o3"
    label: "Allowed Models"
    description: "Restrict which models this agent can use (leave empty for all)"
    editable: admin

installs:
  runtimes:
    openclaw:
      config:
        models:
          providers:
            openai:
              api: openai-completions

capabilities:
  - llm
  - llm.openai
  - chat
  - tool-use

supported_agents: []

pricing:
  type: paid
  price: 0
  note: "Free to install. AI usage billed via credits or BYOK."

features:
  - "GPT-4o, GPT-4o Mini, o3 models"
  - "Alfe credits (prepaid, metered) or Bring Your Own Key"
  - "Per-agent model access control"
  - "Usage tracking and balance monitoring"
  - "Streaming responses"
