id: console
name: "Console"
version: 1.2.0
description: Web-based access to your agent's OpenClaw Control UI via the Alfe dashboard
license: MIT
depends_on: []
min_gateway_version: 1.0.0

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/console/assets/icon.svg
pricing:
  type: free
features:
  - Web-based OpenClaw Control UI
  - Authenticated direct connection from agent to console service
  - Per-agent token authentication


hooks:
  post_activate: hooks/post_activate.js

# As of v1.2.0 the agent runs the @alfe.ai/openclaw-console plugin which
# maintains an outbound WS to the console service. Browser sessions are
# multiplexed over that WS — no gateway data-plane hop, no public IP.
installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-console"
      config:
        gateway:
          controlUi:
            allowedOrigins:
              - "https://console.dev.alfe.ai"
              - "https://console.alfe.ai"
            dangerouslyDisableDeviceAuth: true

capabilities:
  - console.web
