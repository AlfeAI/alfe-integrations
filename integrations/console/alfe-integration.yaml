id: console
name: "Console"
version: 1.1.0
description: Web-based access to your agent's OpenClaw Control UI via the Alfe dashboard
license: MIT
depends_on: []
min_gateway_version: 1.0.0

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/console/assets/icon.svg
pricing:
  type: free
features:
  - Web-based OpenClaw Control UI
  - Authenticated proxy access through dashboard
  - Per-agent token authentication


hooks:
  post_activate: hooks/post_activate.js

# As of v1.1.0 the console no longer publishes the gateway token to the cloud
# and OpenClaw stays bound to loopback. The cloud reaches the agent via the
# daemon's outbound tunnel WS instead of dialing the agent host directly.
installs:
  runtimes:
    openclaw:
      config:
        gateway:
          controlUi:
            allowedOrigins:
              - "https://console.dev.alfe.ai"
              - "https://console.alfe.ai"
            dangerouslyDisableDeviceAuth: true

capabilities:
  - console.web
