id: xero
name: "Xero Accounting"
version: 1.1.0
description: Connect your agent to Xero — full accounting access via official Xero MCP server
license: MIT
min_gateway_version: 1.0.0

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

features:
  - Full Xero API access via official @xeroapi/xero-mcp-server (50+ tools)
  - Automatic OAuth2 token refresh
  - Create and manage invoices, bills, contacts, payments
  - Financial reports, bank transactions, quotes, inventory
  - Chart of accounts, tax rates, currencies, and more

installs:
  runtimes:
    openclaw: {}

mcp_servers:
  - id: xero
    command: xero-mcp-proxy
    hook_managed: true

hooks:
  post_activate: hooks/post_activate.mjs

config_schema:
  - key: xero_account
    type: oauth_connect
    label: "Xero Account"
    description: "Connect the Xero account for this agent"
    required: true
    oauth_provider: xero
