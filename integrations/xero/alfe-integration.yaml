id: xero
name: "Xero Accounting"
version: 1.0.0
description: Connect your agent to Xero — manage invoices, contacts, payments, and financial reports
license: MIT
min_gateway_version: 1.0.0

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

features:
  - Create and manage invoices and bills
  - Manage contacts and customers
  - Record and track payments
  - View financial reports (P&L, Balance Sheet, Trial Balance)
  - List bank transactions and accounts
  - Quote and inventory management

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-xero"

config_schema:
  - key: xero_account
    type: oauth_connect
    label: "Xero Account"
    description: "Connect the Xero account for this agent"
    required: true
    oauth_provider: xero

capabilities:
  - xero.invoices
  - xero.contacts
  - xero.payments
  - xero.reports
  - xero.bank_transactions
  - xero.quotes
  - xero.items
