id: google
name: "Google Workspace"
version: 2.0.0
description: Connect your agent to Google Workspace — Chat, Drive, Gmail, Calendar, Sheets, Docs and more
license: MIT
depends_on: []
min_gateway_version: 1.0.0

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/google/assets/icon.svg
preview_images:
  - https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/google/assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Google Chat messaging (DMs, spaces, threads)
  - Google Drive file management
  - Gmail send/read/triage
  - Google Calendar scheduling
  - Google Sheets read/write
  - Google Docs editing
  - Full Google Workspace CLI (80+ skills)

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-google-chat"
      skills:
        # Core service skills
        - clawhub: gws-shared
        - clawhub: gws-chat
        - clawhub: gws-drive
        - clawhub: gws-gmail
        - clawhub: gws-calendar
        - clawhub: gws-sheets
        - clawhub: gws-docs
        - clawhub: gws-slides
        - clawhub: gws-tasks
        - clawhub: gws-people
        - clawhub: gws-meet
        - clawhub: gws-forms
        - clawhub: gws-keep
        # Helper skills (common operations)
        - clawhub: gws-chat-send
        - clawhub: gws-gmail-send
        - clawhub: gws-gmail-triage
        - clawhub: gws-sheets-read
        - clawhub: gws-calendar-agenda
        - clawhub: gws-drive-upload
        - clawhub: gws-drive-search

hooks:
  post_install: hooks/post-install.sh
  health_check: hooks/health.sh

config_schema:
  - key: google_account
    type: oauth_connect
    label: "Google Account"
    description: "Connect the Google account for this agent"
    required: true
    oauth_provider: google
  - key: offline_message
    type: string
    label: "Offline Auto-Reply"
    description: "Message sent when someone messages in Google Chat while the agent is offline. Leave empty to disable."
    required: false
    default: "I'm currently offline. I'll get back to you when I'm available."
    editable: agent

capabilities:
  - google.chat
  - google.drive
  - google.gmail
  - google.calendar
  - google.sheets
  - google.docs
  - google.meet
  - google.workspace
