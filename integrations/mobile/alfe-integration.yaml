id: mobile
name: "Mobile"
version: 1.0.0
description: Give your agent a phone number for calls and SMS
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Agent runtimes this integration supports
supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/mobile/assets/icon.svg
preview_images:
  - https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/mobile/assets/preview-dashboard.svg
pricing:
  type: free
  description: "Free to install. Phone number rental billed separately when a number is assigned."
features:
  - Search and purchase phone numbers
  - Inbound & outbound calls
  - SMS messaging

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-mobile"
      config: {}

capabilities:
  - mobile.call
  - mobile.sms
  - mobile.numbers.get
  - mobile.numbers.search
  - mobile.numbers.assign
  - mobile.numbers.release
