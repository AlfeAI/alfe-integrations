id: teams
name: "Microsoft Teams"
version: 1.0.0
description: Connect your agent to Microsoft Teams channels and chats
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Agent runtimes this integration supports (empty = universal/all runtimes)
supported_agents: []

author:
  name: Alfe
  url: https://alfe.ai
icon: https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/teams/assets/icon.svg
preview_images:
  - https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/teams/assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Channel messaging
  - Direct messages
  - Group chats
  - Slash commands
  - Adaptive cards

config_schema:
  - key: teams_workspace
    type: oauth_connect
    label: "Teams Workspace"
    description: "Connect your Microsoft Teams workspace"
    required: true
    oauth_provider: teams

capabilities:
  - teams.messages
  - teams.commands
  - teams.cards
