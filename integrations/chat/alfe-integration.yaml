id: chat
name: "Chat"
version: 1.0.0
description: Add a web chat widget and mobile app channel to your agent
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Agent runtimes this integration supports (empty = universal/all runtimes)
supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/chat/assets/icon.svg
preview_images:
  - https://raw.githubusercontent.com/AlfeAI/alfe-integrations/main/integrations/chat/assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Web chat widget
  - Mobile app
  - "Voice button (requires Voice integration)"


installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-chat"

config_schema: []

capabilities:
  - chat.web
  - chat.mobile
  - chat.sessions
