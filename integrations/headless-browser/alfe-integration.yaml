id: headless-browser
name: "Headless Browser"
version: 1.0.1
description: Installs and configures Google Chrome for headless Linux servers
license: MIT
depends_on: []
min_gateway_version: 1.0.0

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai

pricing:
  type: free

installs:
  runtimes:
    openclaw:
      config:
        browser:
          executablePath: "/usr/bin/google-chrome-stable"
          noSandbox: true
          headless: true

hooks:
  post_install: hooks/install.sh
  health_check: hooks/health.sh
  pre_uninstall: hooks/uninstall.sh

config_schema: []

capabilities:
  - browser.navigate
  - browser.interact
  - browser.screenshot
  - browser.evaluate
