id: anthropic
name: "Anthropic (Claude)"
version: "1.0.0"
description: "Connect your agent to Claude models via Alfe credits or your own API key"
author: "Alfe"
license: "MIT"

config_schema:
  - key: mode
    type: enum
    options: ["alfe_credits", "byok"]
    default: alfe_credits
    label: "API Key Source"
    description: "Use Alfe credits (proxied, metered) or bring your own Anthropic key"
    required: true

  - key: api_key
    type: secret
    label: "Anthropic API Key"
    description: "Your Anthropic API key (sk-ant-...)"
    depends_on_field: { key: mode, value: "byok" }

  - key: default_model
    type: select
    select_options:
      - label: "Claude Opus 4.6"
        value: "claude-opus-4-6-20250514"
      - label: "Claude Sonnet 4.6"
        value: "claude-sonnet-4-6-20250514"
      - label: "Claude Haiku 4.5"
        value: "claude-haiku-4-5-20251001"
    default: "claude-sonnet-4-6-20250514"
    label: "Default Model"
    description: "The model your agent uses by default (can be overridden per-conversation)"

  - key: allowed_models
    type: multi_select
    select_options:
      - label: "Claude Opus 4.6"
        value: "claude-opus-4-6-20250514"
      - label: "Claude Sonnet 4.6"
        value: "claude-sonnet-4-6-20250514"
      - label: "Claude Haiku 4.5"
        value: "claude-haiku-4-5-20251001"
    label: "Allowed Models"
    description: "Restrict which models this agent can use (leave empty for all)"
    editable: admin

installs:
  runtimes:
    openclaw:
      config:
        models:
          providers:
            anthropic:
              api: anthropic-messages
              baseUrl: "http://localhost:18193"
              apiKey: "injected-by-proxy"

hooks:
  post_install: hooks/install.sh
  pre_uninstall: hooks/uninstall.sh

capabilities:
  - llm
  - llm.anthropic
  - chat
  - tool-use

supported_agents: []

pricing:
  type: paid
  price: 0
  note: "Free to install. AI usage billed via credits or BYOK."

features:
  - "Claude Opus 4.6, Sonnet 4.6, Haiku 4.5 models"
  - "Alfe credits (prepaid, metered) or Bring Your Own Key"
  - "Per-agent model access control"
  - "Usage tracking and balance monitoring"
  - "Streaming responses"
