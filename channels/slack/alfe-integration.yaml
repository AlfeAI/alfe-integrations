id: slack
name: "Slack"
version: 1.0.0
description: Connect your agent to Slack workspaces
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Connect providers whose credentials this channel adapter resolves.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [slack]
# Channel type — drives Channel-driven activation in getDesiredState.
# Locked enum from packages/integration-manifest.
channel_type: slack

# Agent runtimes this integration supports. OpenClaw-only: this channel
# adapter has no Hermes equivalent yet. (An empty list means "all runtimes",
# which would wrongly attempt this on Hermes — so it is pinned to openclaw.)
supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: ./assets/icon.svg
preview_images:
  - ./assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Channel messaging
  - Slash commands
  - Thread support
  - Direct messages


config_schema:
  - key: slack_workspace
    type: oauth_connect
    label: "Slack Workspace"
    description: "Connect your Slack workspace via OAuth"
    required: true
    oauth_provider: slack

capabilities:
  - slack.messages
  - slack.commands
  - slack.threads
