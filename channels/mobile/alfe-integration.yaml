id: mobile
name: "Mobile"
version: 1.0.0
description: Give your agent a phone number for calls and SMS
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Channel type — drives Channel-driven activation in getDesiredState.
# Locked enum from packages/integration-manifest.
#
# A Mobile Connection ALWAYS provisions a default `sms` ChannelEntity on
# purchase (services/connect/api/connections/mobile/purchase/post.ts), so
# anchoring activation on the `sms` channel makes the mobile integration
# (and its `@alfe.ai/openclaw-mobile` plugin) install whenever an agent has
# a working phone number — exactly the always-on SMS/calls baseline this
# integration represents.
#
# EITHER semantics (compose.ts): with `channel_type` set, Channel presence
# is the sole activation trigger. `requires_connection` is intentionally
# omitted — it would be advisory only here and the `sms` channel already
# implies the parent `mobile` Connection.
channel_type: sms

# Agent runtimes this integration supports
supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: ./assets/icon.svg
preview_images:
  - ./assets/preview-dashboard.svg
pricing:
  type: free
  description: "Free to install. Phone number rental billed separately when a number is assigned."
features:
  - Search and purchase phone numbers
  - Inbound & outbound calls
  - SMS messaging

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-mobile@0.0.14"
      config: {}

capabilities:
  - mobile.call
  - mobile.sms
  - mobile.numbers.get
  - mobile.numbers.search
  - mobile.numbers.assign
  - mobile.numbers.release
