id: google-chat
name: "Google Chat"
version: 1.0.4
description: Receive and respond to Google Chat direct messages
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Connect providers whose credentials this channel adapter resolves.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [google]
# Channel type — drives Channel-driven activation in getDesiredState.
# Locked enum from packages/integration-manifest.
channel_type: google_chat

supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: ./assets/icon.svg
pricing:
  type: free
features:
  - Google Chat direct messages
  - Per-agent Google identity
  - Automatic space discovery

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-google-chat@0.0.23"

config_schema:
  - key: google_chat_account
    type: oauth_connect
    label: "Google Account"
    description: "Connect a Google account for Chat messaging"
    required: true
    oauth_provider: google
    oauth_scopes: ["chat"]
    oauth_integration_id: google-chat

capabilities:
  - google-chat.messages
  - google-chat.dm
