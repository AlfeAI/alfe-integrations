id: whatsapp
name: "WhatsApp"
version: 1.0.2
description: Add WhatsApp messaging to your agent's phone number
license: MIT
depends_on: [mobile]
min_gateway_version: 1.0.0

# Channel type — drives Channel-driven activation in getDesiredState.
# Locked enum from packages/integration-manifest.
# requires_connection is intentionally absent until PR 10 introduces the
# `mobile` connect provider; whatsapp channels anchor on a Mobile Connection.
channel_type: whatsapp

# Agent runtimes this integration supports. OpenClaw-only: installs the
# @alfe.ai/openclaw-whatsapp plugin, which has no Hermes equivalent yet.
# (An empty list means "all runtimes", which would wrongly attempt this on
# Hermes — so it is pinned to openclaw.)
supported_agents: [openclaw]

author:
  name: Alfe
  url: https://alfe.ai
icon: ./assets/icon.svg
preview_images:
  - ./assets/preview-dashboard.svg
pricing:
  type: usage
  description: "Outbound WhatsApp messages deducted from credit pool via Twilio. Inbound (user-initiated) conversations are free."
features:
  - Send and receive WhatsApp messages
  - Conversations visible in dashboard Chat tab
  - Uses your agent's existing phone number from Mobile integration
  - Media support (images, documents)

installs:
  runtimes:
    openclaw:
      plugins:
        - package: "@alfe.ai/openclaw-whatsapp@0.0.17"
      config: {}

config_schema: []

capabilities:
  - whatsapp.messages
  - whatsapp.media
