id: discord
name: "Discord"
version: 1.0.0
description: Connect your agent to a Discord server
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Connect providers whose credentials this channel adapter resolves.
# OR-semantics: any one satisfies. Validated against the connect provider registry.
requires_connection: [discord]
# Channel type — drives Channel-driven activation in getDesiredState.
# Locked enum from packages/integration-manifest.
channel_type: discord

# Agent runtimes this integration supports (empty = universal/all runtimes)
supported_agents: []

author:
  name: Alfe
  url: https://alfe.ai
icon: ./assets/icon.svg
preview_images:
  - ./assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Text channels
  - Slash commands
  - Thread support
  - "Voice channels (requires Voice integration)"


config_schema:
  - key: discord_server
    type: oauth_connect
    label: "Discord Server"
    description: "Connect your Discord server via OAuth"
    required: true
    oauth_provider: discord

capabilities:
  - discord.messages
  - discord.commands
  - discord.threads
  - discord.voice
