id: voice
name: "Voice"
version: 1.0.1
description: Voice call integration for Alfe agents (Twilio + Discord)
license: MIT
depends_on: []
min_gateway_version: 1.0.0

# Channel type — drives Channel-driven activation in getDesiredState.
# Locked enum from packages/integration-manifest.
# requires_connection is intentionally absent until PR 10 introduces the
# `mobile` connect provider; voice channels anchor on a Mobile Connection.
channel_type: voice

# Agent runtimes this integration supports (empty = universal/all runtimes)
supported_agents: [openclaw]

# Marketplace metadata
author:
  name: Alfe
  url: https://alfe.ai
icon: ./assets/icon.svg
preview_images:
  - ./assets/preview-dashboard.svg
pricing:
  type: free
features:
  - Inbound and outbound voice calls via Twilio
  - Real-time speech-to-text transcription
  - Text-to-speech responses with ElevenLabs
  - DTMF tone handling
  - Call transfer and conferencing support
  - Discord voice channel integration

# The `@alfe.ai/openclaw-voice` plugin (voice_tts / voice_stt + telephony
# tools) is now installed by the baseline `alfe` integration for EVERY
# agent, so this channel integration no longer declares it — that avoids a
# redundant install and a version-conflict surface (the daemon dedups plugin
# installs by bare package name, so a divergent pin here would be silently
# ignored). This integration owns only the Twilio/telephony concern:
# config_schema below + channel_type activation + the relay hooks.

config_schema:
  - key: twilio_account_sid
    type: string
    label: "Twilio Account SID"
    description: "Your Twilio Account SID from twilio.com/console"
    required: true
  - key: twilio_auth_token
    type: secret
    label: "Twilio Auth Token"
    description: "Your Twilio Auth Token (stored in memory only, never persisted)"
    required: true
  - key: phone_number
    type: string
    label: "Twilio Phone Number"
    description: "E.164 format, e.g. +12025551234"
    required: true
  - key: relay_url
    type: string
    label: "Voice Relay URL"
    description: "URL of the Alfe voice relay service"
    required: false
    default: "wss://voice.alfe.ai"

capabilities:
  - voice.call
  - voice.answer
  - voice.dtmf
  - voice.hangup

hooks:
  post_install: hooks/install.sh
  pre_uninstall: hooks/uninstall.sh
  health_check: hooks/health.sh
